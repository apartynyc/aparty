<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Our Sound System</title>
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            line-height: 1.6;
            margin: 0;
            padding: 80px;
            background-color: white;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 0px;
            border: 1px solid black;
           
        }
        h1 {
            color: #333;
            text-align: center;
        }
        form {
            display: grid;
            gap: 10px;
        }
        label {
            font-weight: bold;
        }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: black;
            box-shadow: 0 0 5px black(76, 175, 80, 0.5);
        }
        button {
            background-color: white;
            color: black;
            padding: 10px 15px;
            border: 1px solid black;
            border-radius: 0px;
            cursor: pointer;
            font-size: 16px;
            font-family: 'Times New Roman', Times, serif;
        }
        button:focus {
            outline: none;
            box-shadow: 0 0 5px black(76, 175, 80, 0.5);
        }
        button:hover {
            background-color: #ddd;
            color: red;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Book a party system</h1>
        <form action="https://formsubmit.co/info@aparty.nyc" method="POST">
            <input type="hidden" name="_subject" value="New Sound System Booking">
            <input type="hidden" name="_template" value="table">
            <input type="hidden" name="_autoresponse" value="Thank you for your booking request. We will get back to you shortly.">
            
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="phone">Phone:</label>
            <input type="tel" id="phone" name="phone" required>

            <label for="date">Booking Date:</label>
            <input type="date" id="date" name="date" required>

            <label for="system">Which System:</label>
            <select id="system" name="system" required>
                <option value="">Select a system</option>
                <option value="Qsc System">Qsc System</option>
                <option value="Martin System">Martin System</option>
                <option value="Masada System">Masada System</option>
                <option value="Dj Equipment">Dj Equipment</option>
                <option value="Custom">Custom</option>
            </select>

            <label for="additionalInfo">Additional Information:</label>
            <textarea id="additionalInfo" name="additionalInfo" rows="4"></textarea>

            <button type="submit">Submit Booking Request</button>
        </form>
    </div>
</body>
</html>
